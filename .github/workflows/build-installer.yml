name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # trigger on version tags: v1.3, v1.4, etc.
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: |
          choco install innosetup --yes --no-progress
        shell: powershell

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer\lagoon_setup.iss
        shell: powershell

      - name: Build lite test installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer\lagoon_setup_test.iss
        shell: powershell

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: LagoonSetup
          path: installer\LagoonSetup-*.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\LagoonSetup-*.exe
          fail_on_unmatched_files: true
