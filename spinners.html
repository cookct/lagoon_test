<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagoon Loading Spinners</title>
    <style>
        :root {
            --bg: #0a0e16;
            --card-bg: #161b22;
            --accent: #0e639c; /* Standard Lagoon Blue */
            --cyan: #4fc1ff;
            --text: #e6edf3;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        h1 { margin-bottom: 40px; font-weight: 300; letter-spacing: 1px; }

        .spinner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        .spinner-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: transform 0.2s;
        }

        .spinner-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .spinner-name {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
        }

        /* --- 1. The Classic Dual-Tone --- */
        .spinner-classic {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(14, 99, 156, 0.2);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* --- 2. The Glowing Ring --- */
        .spinner-glow {
            width: 40px;
            height: 40px;
            border: 2px solid transparent;
            border-top-color: var(--cyan);
            border-left-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.6s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
            box-shadow: 0 0 10px var(--accent);
        }

        /* --- 3. Pulsing Orbs --- */
        .spinner-pulse {
            display: flex;
            gap: 6px;
        }
        .spinner-pulse div {
            width: 12px;
            height: 12px;
            background: var(--cyan);
            border-radius: 50%;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .spinner-pulse div:nth-child(2) { animation-delay: 0.2s; }
        .spinner-pulse div:nth-child(3) { animation-delay: 0.4s; }

        /* --- 4. Gradient Sweep --- */
        .spinner-gradient {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--cyan));
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff 0);
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #fff 0);
            animation: spin 1s linear infinite;
        }

        /* --- 5. Nested Double Spin --- */
        .spinner-double {
            width: 40px;
            height: 40px;
            border: 2px solid transparent;
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }
        .spinner-double::before {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.5s linear reverse infinite;
        }

        /* --- 6. The "Radar" Dot --- */
        .spinner-radar {
            width: 40px;
            height: 40px;
            position: relative;
        }
        .spinner-radar::after {
            content: "";
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 15px var(--cyan);
        }
        .spinner-radar { animation: spin 1s infinite cubic-bezier(0.4, 0, 0.2, 1); }

        /* --- 7. Modern Dots --- */
        .spinner-dots {
            width: 40px;
            height: 10px;
            display: flex;
            justify-content: space-between;
        }
        .spinner-dots div {
            width: 8px;
            height: 8px;
            background: var(--cyan);
            border-radius: 50%;
            animation: bounce 0.5s infinite alternate;
        }
        .spinner-dots div:nth-child(2) { animation-delay: 0.1s; }
        .spinner-dots div:nth-child(3) { animation-delay: 0.2s; }

        /* --- 8. The Morphing Square --- */
        .spinner-square {
            width: 30px;
            height: 30px;
            background: var(--cyan);
            animation: morph 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        @keyframes bounce {
            to { transform: translateY(-10px); opacity: 0.5; }
        }

        @keyframes morph {
            0% { transform: rotate(0deg); border-radius: 0; }
            50% { transform: rotate(180deg); border-radius: 50%; }
            100% { transform: rotate(360deg); border-radius: 0; }
        }

    </style>
</head>
<body>

    <h1>Load Spinner Gallery</h1>

    <div class="spinner-grid">
        <div class="spinner-card">
            <div class="spinner-classic"></div>
            <div class="spinner-name">Classic Dual</div>
        </div>
        <div class="spinner-card">
            <div class="spinner-glow"></div>
            <div class="spinner-name">Neon Glow</div>
        </div>
        <div class="spinner-card">
            <div class="spinner-pulse">
                <div></div><div></div><div></div>
            </div>
            <div class="spinner-name">Pulsing Orbs</div>
        </div>
        <div class="spinner-card">
            <div class="spinner-gradient"></div>
            <div class="spinner-name">Conic Sweep</div>
        </div>
        <div class="spinner-card">
            <div class="spinner-double"></div>
            <div class="spinner-name">Double Spin</div>
        </div>
        <div class="spinner-card">
            <div class="spinner-radar"></div>
            <div class="spinner-name">Radar Dot</div>
        </div>
        <div class="spinner-card">
            <div class="spinner-dots">
                <div></div><div></div><div></div>
            </div>
            <div class="spinner-name">Bouncing Dots</div>
        </div>
        <div class="spinner-card">
            <div class="spinner-square"></div>
            <div class="spinner-name">Morphing Core</div>
        </div>
    </div>

</body>
</html>
