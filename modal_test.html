<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Models — UI Designer</title>
    <style id="dynamic-styles">
        :root {
            /* Overlay */
            --overlay-bg: rgba(0, 5, 15, 0.7);
            
            /* Modal */
            --modal-bg: rgba(20, 20, 20, 0.25);
            --modal-blur: 16px;
            --modal-sat: 100%;
            --modal-border: rgba(255, 255, 255, 0.1);
            --modal-radius: 8px;
            --modal-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --modal-width: 580px;
            --modal-height: 80vh;
            
            /* Header */
            --header-color: #ffffff;
            --header-size: 1.1rem;
            
            /* Tabs */
            --tab-bg: rgba(0, 0, 0, 0.2);
            --tab-text: #888;
            --tab-active-bg: rgba(0, 200, 180, 0.2);
            --tab-active-text: #00e5c0;
            --tab-border: rgba(255, 255, 255, 0.1);
            
            /* List Items */
            --row-border: rgba(255, 255, 255, 0.05);
            --name-color: #e0e0e0;
            --id-color: #888;
            
            /* Buttons */
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(255, 255, 255, 0.1);
            --btn-text: #ccc;
            --primary-bg: rgba(0, 200, 180, 0.2);
            --primary-border: rgba(0, 200, 180, 0.5);
            --primary-text: #00e5c0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
            background-image: url('images/modal_test.png');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .modal-overlay {
            position: fixed;
            inset: 0 0 120px 0;
            background: var(--overlay-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--modal-bg);
            backdrop-filter: blur(var(--modal-blur)) saturate(var(--modal-sat));
            -webkit-backdrop-filter: blur(var(--modal-blur)) saturate(var(--modal-sat));
            border: 1px solid var(--modal-border);
            border-radius: var(--modal-radius);
            width: var(--modal-width);
            max-width: 95vw;
            height: var(--modal-height);
            max-height: 90%;
            display: flex;
            flex-direction: column;
            box-shadow: var(--modal-shadow);
            overflow: hidden;
            padding: 1.25rem;
            color: #eee;
        }

        .modal-header {
            margin-bottom: 1rem;
            flex-shrink: 0;
        }
        .modal-header h2 {
            font-size: var(--header-size);
            color: var(--header-color);
            font-weight: 600;
        }

        .sidebar-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 1rem;
            background: var(--tab-bg);
            padding: 4px;
            border-radius: 6px;
            border: 1px solid var(--tab-border);
        }
        .tab-btn {
            flex: 1;
            padding: 6px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--tab-text);
            font-size: 0.8rem;
            cursor: pointer;
        }
        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--tab-active-text);
        }

        #model-manager-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .anchor-entry-row {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--row-border);
        }
        .model-info { flex: 1; }
        .model-name { font-weight: bold; color: var(--name-color); font-size: 0.9rem; margin-bottom: 2px; }
        .model-id { font-size: 0.75rem; color: var(--id-color); }
        
        .btn-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #888;
        }

        .modal-actions {
            margin-top: 1rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            padding-top: 1rem;
            border-top: 1px solid var(--row-border);
            flex-shrink: 0;
        }

        .close-btn, .primary-btn {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid var(--btn-border);
            background: var(--btn-bg);
            color: var(--btn-text);
        }
        .primary-btn {
            background: var(--primary-bg);
            border-color: var(--primary-border);
            color: var(--primary-text);
        }

        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: rgba(0, 5, 15, 0.98);
            border-top: 1px solid rgba(0,200,180,0.35);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            gap: 8px;
        }

        .ctrl-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #ctrl-tabs { display: flex; gap: 6px; }
        .ctrl-tab {
            padding: 4px 14px;
            border: 1px solid rgba(0,200,180,0.3);
            border-radius: 4px;
            background: transparent;
            color: #6aabab;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .ctrl-tab.active { background: rgba(0,200,180,0.25); color: #a0e0e0; border-color: rgba(0,200,180,0.6); }

        .panel { display: none; }
        .panel.active { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 18px; 
            flex: 1; 
            overflow-y: auto; 
            align-content: flex-start;
            padding-bottom: 10px;
        }

        .control-group { display: flex; flex-direction: column; gap: 4px; width: 180px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 0.72rem; color: #7ababa; }
        .val { font-family: monospace; color: #00e5c0; }
        
        input[type=range] { width: 100%; appearance: none; background: rgba(0,200,180,0.2); height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 13px; height: 13px; background: #00e5c0; border-radius: 50%; cursor: pointer; }
        input[type=color] { width: 100%; height: 28px; border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; background: none; cursor: pointer; }

        .vdiv { width: 1px; background: rgba(255,255,255,0.1); align-self: stretch; margin: 0 5px; }

        .copy-btn {
            padding: 6px 16px;
            background: rgba(0,200,180,0.15);
            border: 1px solid rgba(0,200,180,0.5);
            border-radius: 6px;
            color: #a0e0e0;
            font-size: 0.75rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Manage Models</h2>
        </div>
        <div class="sidebar-tabs">
            <button class="tab-btn active">Venice</button>
            <button class="tab-btn">Together.ai</button>
            <button class="tab-btn">Installed</button>
        </div>
        <div id="model-manager-content">
            <div class="anchor-entry-row">
                <div class="model-info">
                    <div class="model-name">zai-org-glm-5</div>
                    <div class="model-id">venice:zai-org-glm-5</div>
                </div>
                <button class="btn-icon">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
            <div class="anchor-entry-row">
                <div class="model-info">
                    <div class="model-name">Llama 3.1 405B</div>
                    <div class="model-id">meta-llama/llama-3.1-405b-instruct</div>
                </div>
                <button class="btn-icon">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
        </div>
        <div class="modal-actions">
            <button type="button" class="close-btn">Close</button>
            <button type="button" class="primary-btn">Install Selected</button>
        </div>
    </div>
</div>

<div id="controls">
    <div class="ctrl-header">
        <div id="ctrl-tabs">
            <button class="ctrl-tab active" data-panel="modal">Modal Box</button>
            <button class="ctrl-tab" data-panel="typography">Typography</button>
            <button class="ctrl-tab" data-panel="tabs">Tabs & Lists</button>
            <button class="ctrl-tab" data-panel="buttons">Buttons</button>
        </div>
        <button class="copy-btn" id="copy-css">Copy All CSS</button>
    </div>

    <div class="panel active" id="panel-modal">
        <div class="control-group" style="width: 100%; margin-bottom: 5px;">
            <label>Environment Background URL</label>
            <input type="text" id="bg-url" value="images/modal_test.png" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #00e5c0; padding: 4px; border-radius: 3px; font-size: 0.7rem;">
        </div>
        <div class="control-group"><label>Bg Tint</label><input type="color" id="modal-bg-color" value="#141414"></div>
        <div class="control-group"><label>Bg Opacity <span class="val" id="modal-op-val">0.25</span></label><input type="range" id="modal-op" min="0" max="1" step="0.01" value="0.25"></div>
        <div class="control-group"><label>Blur (px) <span class="val" id="blur-val">16</span></label><input type="range" id="modal-blur" min="0" max="40" step="1" value="16"></div>
        <div class="control-group"><label>Overlay Op <span class="val" id="overlay-op-val">0.70</span></label><input type="range" id="overlay-op" min="0" max="1" step="0.01" value="0.70"></div>
        <div class="control-group"><label>Border Op <span class="val" id="border-op-val">0.10</span></label><input type="range" id="border-op" min="0" max="1" step="0.01" value="0.10"></div>
        <div class="control-group"><label>Radius <span class="val" id="radius-val">8</span></label><input type="range" id="modal-radius" min="0" max="32" step="1" value="8"></div>
    </div>

    <div class="panel" id="panel-typography">
        <div class="control-group"><label>Header Color</label><input type="color" id="h-color" value="#ffffff"></div>
        <div class="control-group"><label>Model Name</label><input type="color" id="name-color" value="#e0e0e0"></div>
        <div class="control-group"><label>Model ID</label><input type="color" id="id-color" value="#888888"></div>
    </div>

    <div class="panel" id="panel-tabs">
        <div class="control-group"><label>Tab Active Bg</label><input type="color" id="tab-a-bg" value="#00c8b4"></div>
        <div class="control-group"><label>Tab Active Text</label><input type="color" id="tab-a-txt" value="#00e5c0"></div>
        <div class="control-group"><label>Row Border Op <span class="val" id="row-op-val">0.05</span></label><input type="range" id="row-op" min="0" max="1" step="0.01" value="0.05"></div>
    </div>

    <div class="panel" id="panel-buttons">
        <div class="control-group"><label>Primary Bg</label><input type="color" id="p-bg" value="#00c8b4"></div>
        <div class="control-group"><label>Primary Border</label><input type="color" id="p-brd" value="#00c8b4"></div>
        <div class="control-group"><label>Primary Text</label><input type="color" id="p-txt" value="#00e5c0"></div>
    </div>
</div>

<script>
    const root = document.querySelector(':root');
    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        return `${r}, ${g}, ${b}`;
    }
    function update() {
        // Body Background
        document.body.style.backgroundImage = `url('${document.getElementById('bg-url').value}')`;

        const mBg = hexToRgb(document.getElementById('modal-bg-color').value), mOp = document.getElementById('modal-op').value, blur = document.getElementById('modal-blur').value, oOp = document.getElementById('overlay-op').value, bOp = document.getElementById('border-op').value, rad = document.getElementById('modal-radius').value;
        root.style.setProperty('--modal-bg', `rgba(${mBg}, ${mOp})`);
        root.style.setProperty('--modal-blur', `${blur}px`);
        root.style.setProperty('--overlay-bg', `rgba(0, 5, 15, ${oOp})`);
        root.style.setProperty('--modal-border', `rgba(255, 255, 255, ${bOp})`);
        root.style.setProperty('--modal-radius', `${rad}px`);
        document.getElementById('modal-op-val').textContent = mOp; document.getElementById('blur-val').textContent = blur; document.getElementById('overlay-op-val').textContent = oOp; document.getElementById('border-op-val').textContent = bOp; document.getElementById('radius-val').textContent = rad;
        root.style.setProperty('--header-color', document.getElementById('h-color').value);
        root.style.setProperty('--name-color', document.getElementById('name-color').value);
        root.style.setProperty('--id-color', document.getElementById('id-color').value);
        const tabABg = hexToRgb(document.getElementById('tab-a-bg').value);
        root.style.setProperty('--tab-active-bg', `rgba(${tabABg}, 0.2)`);
        root.style.setProperty('--tab-active-text', document.getElementById('tab-a-txt').value);
        const rowOp = document.getElementById('row-op').value;
        root.style.setProperty('--row-border', `rgba(255, 255, 255, ${rowOp})`);
        document.getElementById('row-op-val').textContent = rowOp;
        const pBg = hexToRgb(document.getElementById('p-bg').value);
        root.style.setProperty('--primary-bg', `rgba(${pBg}, 0.2)`);
        root.style.setProperty('--primary-border', `rgba(${pBg}, 0.5)`);
        root.style.setProperty('--primary-text', document.getElementById('p-txt').value);
    }
    document.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
    document.querySelectorAll('.ctrl-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.ctrl-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
        });
    });
    document.getElementById('copy-css').onclick = () => {
        const css = document.getElementById('dynamic-styles').innerText;
        navigator.clipboard.writeText(css);
        alert('CSS Variables copied!');
    };
    update();
</script>
</body>
</html>
